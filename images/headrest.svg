<svg xmlns="http://www.w3.org/2000/svg" width="640" height="560" viewBox="0 0 640 560">
  <rect width="640" height="560" fill="#f7f5f1"/>
  <text x="320" y="56" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="42" font-weight="bold" fill="#2d3748">ヘッドレスト（headrest）</text>
  <text x="320" y="96" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="22" fill="#718096">座席の上部、頭を支える部分</text>
  <!-- seat cushion (base) -->
  <rect x="195" y="432" width="250" height="64" rx="26" fill="#cfd8e0" stroke="#4a5568" stroke-width="4"/>
  <!-- backrest -->
  <rect x="195" y="205" width="115" height="240" rx="34" fill="#cfd8e0" stroke="#4a5568" stroke-width="4"/>
  <!-- posts -->
  <rect x="221" y="178" width="12" height="36" fill="#7b8794"/>
  <rect x="272" y="178" width="12" height="36" fill="#7b8794"/>
  <!-- headrest -->
  <rect x="188" y="120" width="128" height="66" rx="24" fill="#dfe6ec" stroke="#4a5568" stroke-width="4"/>
  <!-- highlight -->
  <rect x="178" y="110" width="148" height="86" rx="30" fill="#e8563f" fill-opacity="0.18" stroke="#e8563f" stroke-width="5"/>
  <!-- leader + label -->
  <line x1="326" y1="152" x2="418" y2="152" stroke="#c0392b" stroke-width="3"/>
  <circle cx="326" cy="152" r="5" fill="#c0392b"/>
  <text x="430" y="161" font-family="'Noto Sans JP','Hiragino Sans',sans-serif" font-size="27" font-weight="bold" fill="#c0392b">ここ</text>
</svg>
